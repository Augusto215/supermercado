version: "3.9"

services:
  painel-supermercado:
    container_name: painel-supermercado
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8221:3000"
    environment:
      NODE_ENV: production
      TZ: America/Sao_Paulo
      RHID_API_BASE_URL: https://www.rhid.com.br/v2/api.svc
      RHID_API_TOKEN: ${RHID_API_TOKEN}
      RHID_API_EMAIL: ${RHID_API_EMAIL}
      RHID_API_PASSWORD: ${RHID_API_PASSWORD}
      RHID_API_DOMAIN: ${RHID_API_DOMAIN}
      RHID_FETCH_APURACAO: ${RHID_FETCH_APURACAO:-true}
      RHID_APURACAO_CHUNK_DAYS: ${RHID_APURACAO_CHUNK_DAYS:-31}
      RHID_APURACAO_CONCURRENCY: ${RHID_APURACAO_CONCURRENCY:-5}
      RHID_MIN_REQUEST_INTERVAL_MS: ${RHID_MIN_REQUEST_INTERVAL_MS:-100}
      RHID_RETRY_MAX_ATTEMPTS: ${RHID_RETRY_MAX_ATTEMPTS:-3}
      RHID_RETRY_BASE_DELAY_MS: ${RHID_RETRY_BASE_DELAY_MS:-10000}
      RHID_RETRY_MAX_DELAY_MS: ${RHID_RETRY_MAX_DELAY_MS:-180000}
      RHID_403_COOLDOWN_MS: ${RHID_403_COOLDOWN_MS:-60000}
      RHID_REPORT_CACHE_TTL_SEC: ${RHID_REPORT_CACHE_TTL_SEC:-3600}
      RHID_ENRICH_PAYROLL_WITH_REPORT: ${RHID_ENRICH_PAYROLL_WITH_REPORT:-false}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
    volumes:
      - ./public:/app/public
